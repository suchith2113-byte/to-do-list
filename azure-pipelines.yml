trigger:
  - main

pool:
  name: 'Default'

variables:
  - group: vercel-secrets # 👈 Double check that this matches your Library group name exactly!
  - name: dockerRegistryServiceConnection
    value: 'dockerhub-connection' 
  - name: imageRepository
    value: 'suchith141/todo-list-app'
  - name: tag
    value: '$(Build.BuildId)'

stages:
- stage: CodeQuality
  displayName: 'SonarQube Analysis'
  jobs:
  - job: Analyze
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    - script: |
        npm install sonarqube-scanner --no-save
        npx sonar-scanner -Dsonar.login="sqa_7d7ddee200b2d91fadc9279c3c360a58ec6d36fe"
      displayName: 'Run Manual SonarQube Scan'

- stage: BuildAndPush
  displayName: 'Containerize & Push'
  dependsOn: CodeQuality
  jobs:
  - job: Build
    steps:
    - task: docker@2
      displayName: 'Build and Push to Docker Hub'
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(tag)

- stage: Deploy
  displayName: 'Deploy to Vercel'
  dependsOn: BuildAndPush
  jobs:
  - job: VercelDeploy
    variables:
      # 🔒 This forces the pipeline runner to explicitly fetch the secret from the group mapped above
      TOKEN: $[variables.VERCEL_TOKEN]
      ORG: $[variables.VERCEL_ORG_ID]
      PROJECT: $[variables.VERCEL_PROJECT_ID]
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js for Deployment'

    - script: |
        npm install --global vercel
        vercel --token=$(TOKEN) --prod --yes
      displayName: 'Execute Cloud Vercel Deploy'
      env:
        VERCEL_ORG_ID: $(ORG)
        VERCEL_PROJECT_ID: $(PROJECT)