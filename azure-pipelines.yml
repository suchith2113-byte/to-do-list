trigger:
  - main

pool:
  name: 'Default' # 💻 Directly targets your local active Mac terminal runner

variables:
  - group: vercel-secrets # Links your secure Vercel variables from Library
  - name: dockerRegistryServiceConnection
    value: 'dockerhub-connection' # Matches your Docker Hub Service Connection name
  - name: imageRepository
    value: 'suchith141/todo-list-app'
  - name: tag
    value: '$(Build.BuildId)'

stages:
- stage: CodeQuality
  displayName: 'SonarQube Analysis'
  jobs:
  - job: Analyze
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    # 🛠️ Persistent Local Properties Scan
    - script: |
        npm install sonarqube-scanner --no-save
        npx sonar-scanner -Dsonar.login="sqa_7d7ddee200b2d91fadc9279c3c360a58ec6d36fe"
      displayName: 'Run Manual SonarQube Scan'

- stage: BuildAndPush
  displayName: 'Containerize & Push'
  dependsOn: CodeQuality
  jobs:
  - job: Build
    steps:
    - task: docker@2
      displayName: 'Build and Push to Docker Hub'
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '$(Build.SourcesDirectory)/Dockerfile'
        tags: |
          $(tag)

- stage: Deploy
  displayName: 'Deploy to Vercel'
  dependsOn: BuildAndPush
  jobs:
  - job: VercelDeploy
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js for Deployment'

    # 🎯 Macro Expansion: Using $(VERCEL_TOKEN) directly inside the script line
    # forces Azure DevOps to compile the string token value on the host level.
    - script: |
        npm install --global vercel
        vercel --token=$(VERCEL_TOKEN) --prod --yes
      displayName: 'Execute Cloud Vercel Deploy'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)