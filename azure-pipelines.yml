trigger:
  - main

pool:
  name: 'Default' # 💻 Directly routes jobs to your active local Mac terminal runner

variables:
  - group: vercel-secrets # Links your secure Vercel variables from Library
  - name: dockerRegistryServiceConnection
    value: 'dockerhub-connection' # Matches your Docker Hub Service Connection name
  - name: imageRepository
    value: 'suchith141/todo-list-app'
  - name: tag
    value: '$(Build.BuildId)'

stages:
- stage: CodeQuality
  displayName: 'SonarQube Analysis'
  jobs:
  - job: Analyze
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js'

    # 🛠️ Manual CLI Scan: Bypasses extension parameters to remain compatible with free Community Edition
    - script: |
        npm install -g sonar-scanner
        sonar-scanner \
          -Dsonar.host.url="https://98b9-103-39-127-160.ngrok-free.app" \
          -Dsonar.token="sqa_7d7ddee200b2d91fadc9279c3c360a58ec6d36fe" \
          -Dsonar.projectKey="todo-list" \
          -Dsonar.sources="." \
          -Dsonar.javascript.node.maxspace=2048
      displayName: 'Run Manual SonarQube Scan'

- stage: BuildAndPush
  displayName: 'Containerize & Push'
  dependsOn: CodeQuality
  jobs:
  - job: Build
    steps:
    - task: docker@2
      displayName: 'Build and Push to Docker Hub'
      inputs:
        containerRegistry: '$(dockerRegistryServiceConnection)'
        repository: '$(imageRepository)'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          $(tag)

- stage: Deploy
  displayName: 'Deploy to Vercel'
  dependsOn: BuildAndPush
  jobs:
  - job: VercelDeploy
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '20.x'
      displayName: 'Install Node.js for Deployment'

    - script: |
        npm install --global vercel
        vercel --token $(VERCEL_TOKEN) --prod --yes
      displayName: 'Execute Cloud Vercel Deploy'
      env:
        VERCEL_ORG_ID: $(VERCEL_ORG_ID)
        VERCEL_PROJECT_ID: $(VERCEL_PROJECT_ID)